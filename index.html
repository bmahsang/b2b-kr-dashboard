  --accent:#3b82f6;--accent-hover:#2563eb;--accent-light:#dbeafe;--accent-text:#1d4ed8;

  --success:#22c55e;--success-bg:rgba(34,197,94,0.08);
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.08);
  --bg:#f9fafb;--card:#fff;--text:#111827;--text2:#6b7280;--text3:#9ca3af;--text4:#d1d5db;
  --border:#e5e7eb;--radius:12px;
  --font:'Pretendard','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:80rem;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
@media(min-width:640px){.header-inner{padding:14px 24px;gap:16px}}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{font-size:18px;font-weight:800;color:var(--text)}.header-logo span{color:var(--accent)}
.header-sub{font-size:10px;color:var(--text3);margin-left:-8px}
.header-right{display:flex;align-items:center;gap:8px}
.period-btns{display:flex;gap:4px;flex-wrap:wrap}
.period-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:#f3f4f6;color:var(--text2);border:none;transition:all .15s;white-space:nowrap}
.period-btn:hover{background:#e5e7eb;color:#374151}
.period-btn.active{background:var(--accent);color:#fff}
.header-row2{max-width:80rem;margin:0 auto;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);background:#fff}
@media(min-width:640px){.header-row2{padding:8px 24px}}
.update-info{font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px}
.update-info .time{font-size:12px;color:var(--text3)}
.compare-bar{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3)}
.compare-bar span.label{margin-right:4px}
.cmp-mode{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);border:1px solid var(--border);transition:all .15s}
.cmp-mode:hover{background:#e5e7eb}.cmp-mode.active{background:var(--text);color:#fff;border-color:var(--text)}
.cmp-preset{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--accent);border:none;transition:all .15s}
.cmp-preset:hover{background:var(--accent-light)}.cmp-preset.active{background:var(--accent);color:#fff}
.period-badge{display:inline-block;font-size:11px;color:var(--text2);background:#f3f4f6;padding:4px 12px;border-radius:6px}

.part-row{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px}
@media(min-width:640px){.part-row{grid-template-columns:repeat(3,1fr);gap:16px}}
.part-card{border-left:4px solid;border-radius:var(--radius);padding:16px 20px}
.part-card.vvip{border-color:#f97316;background:#fff7ed}
.part-card.existing{border-color:var(--accent);background:#eff6ff}
.part-card.new-buyer{border-color:#10b981;background:#ecfdf5}
.part-title{font-size:14px;font-weight:700;margin-bottom:12px}
.part-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.part-metric .pm-label{font-size:11px;color:var(--text2)}
.part-metric .pm-val{font-size:16px;font-weight:700;color:var(--text)}
@media(min-width:640px){.part-metric .pm-val{font-size:18px}}
.part-metric .pm-chg{font-size:11px;font-weight:600}
.pm-chg.up{color:#ef4444}.pm-chg.down{color:#3b82f6}

.btn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);transition:.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}.btn-sm{padding:4px 9px;font-size:10px}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text)}.btn-dark:hover{background:#374151}

.content{max-width:80rem;margin:0 auto;padding:16px}
@media(min-width:640px){.content{padding:24px}}

.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:640px){.kpi-row{grid-template-columns:repeat(3,1fr);gap:16px}}
@media(min-width:1024px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:2px}
@media(min-width:640px){.kpi{padding:20px;gap:4px}}
.kpi-label{font-size:12px;color:var(--text2)}
@media(min-width:640px){.kpi-label{font-size:13px}}
.kpi-val{font-size:18px;font-weight:700;color:var(--text)}
@media(min-width:640px){.kpi-val{font-size:24px}}
.kpi-sub{display:flex;align-items:center;gap:5px;margin-top:4px;font-size:11px}
.chg{font-weight:600;font-size:11px}
.chg.up{color:#ef4444}.chg.down{color:#3b82f6}
.kpi-desc{color:var(--text3);font-size:10px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-73{display:grid;grid-template-columns:7fr 3fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-hdr h3{font-size:14px;font-weight:700;color:#374151}.card-hdr .meta{font-size:11px;color:var(--text3)}
.card-body{padding:18px}.card-body.np{padding:0}
.chart-w{position:relative;height:260px}
.chart-sm{position:relative;height:200px}

.seg-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg);margin-bottom:6px;cursor:pointer;transition:.2s}
.seg-item:hover{background:#e5e7eb}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:8px 12px;font-size:12px;border-bottom:1px solid #f3f4f6}
tbody tr:hover{background:#f9fafb}

@media(max-width:1024px){.grid-2,.grid-73{grid-template-columns:1fr}}
@media(max-width:640px){.header-left{flex-wrap:wrap}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

</style>
</head>

function fmtKRW(n) {
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return Math.round(n/10000).toLocaleString()+'만';
  return n.toLocaleString();
}

function fmtFull(n) { return n.toLocaleString()+'원'; }

const ds = D.daily_sales;
function getMonday(dateStr){const[y,m,d]=dateStr.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d));const day=dt.getUTCDay();const diff=day===0?-6:1-day;dt.setUTCDate(dt.getUTCDate()+diff);return dt.toISOString().slice(0,10);}
function addDays(dateStr,n){const[y,m,d]=dateStr.split('-').map(Number);const dt=new Date(Date.UTC(y,m-1,d+n));return dt.toISOString().slice(0,10);}
function getYM(dateStr){return dateStr.slice(0,7);}
function prevYMOf(ym){const[y,m]=ym.split('-').map(Number);const pm=m===1?12:m-1;const py=m===1?y-1:y;return py+'-'+String(pm).padStart(2,'0');}
function lastDayOf(ym){const[y,m]=ym.split('-').map(Number);return new Date(Date.UTC(y,m,0)).getUTCDate();}

const latestDate=ds.length?ds[0].date:new Date().toISOString().slice(0,10);
let curPeriod='today';
let compareMode='preset';

let curYM,monthSum,monthOrd,mom,prevYM;

const PERIODS=[
  {id:'today',label:'오늘'},
  {id:'yesterday',label:'어제'},
  {id:'thisWeek',label:'이번주'},
  {id:'lastWeek',label:'지난주'},
  {id:'thisMonth',label:'이번달'},
  {id:'lastMonth',label:'지난달'},
];

function calcMetrics() {
  const mondayStr=getMonday(latestDate);
  const prevMondayStr=addDays(mondayStr,-7);
  const prevSundayStr=addDays(prevMondayStr,6);
  curYM=getYM(latestDate);
  prevYM=prevYMOf(curYM);
  const prevPrevYM=prevYMOf(prevYM);
  const curDay=parseInt(latestDate.slice(8,10));
  const yesterday=addDays(latestDate,-1);

  if(curPeriod==='today'){
    curData=ds.filter(d=>d.date===latestDate);
    prevData=ds.filter(d=>d.date===yesterday);
    periodLabel='오늘';
    periodDateRange=latestDate.slice(5).replace('-','/');
  } else if(curPeriod==='yesterday'){
    curData=ds.filter(d=>d.date===yesterday);
    prevData=ds.filter(d=>d.date===addDays(yesterday,-1));
    periodLabel='어제';
    periodDateRange=yesterday.slice(5).replace('-','/');
  } else if(curPeriod==='thisWeek'){
    curData=ds.filter(d=>d.date>=mondayStr&&d.date<=latestDate);
    prevData=ds.filter(d=>d.date>=prevMondayStr&&d.date<=prevSundayStr);
    periodLabel='이번주';
    periodDateRange=mondayStr.slice(5).replace('-','/')+'~'+latestDate.slice(5).replace('-','/');
  } else if(curPeriod==='lastWeek'){
    curData=ds.filter(d=>d.date>=prevMondayStr&&d.date<=prevSundayStr);
    const pp=addDays(prevMondayStr,-7);
    prevData=ds.filter(d=>d.date>=pp&&d.date<=addDays(pp,6));
    periodLabel='지난주';
    periodDateRange=prevMondayStr.slice(5).replace('-','/')+'~'+prevSundayStr.slice(5).replace('-','/');
  } else if(curPeriod==='thisMonth'){
    curData=ds.filter(d=>d.date.startsWith(curYM));
    prevData=ds.filter(d=>d.date.startsWith(prevYM)&&parseInt(d.date.slice(8,10))<=curDay);
    periodLabel='이번달';
    periodDateRange=curYM.slice(5).replace(/^0/,'')+'월';
  } else if(curPeriod==='lastMonth'){
    curData=ds.filter(d=>d.date.startsWith(prevYM));
    prevData=ds.filter(d=>d.date.startsWith(prevPrevYM));
    periodLabel='지난달';
    periodDateRange=prevYM.slice(5).replace(/^0/,'')+'월';
  }

  if(cmpPreset==='prevWeek'&&compareMode==='preset'){
    const wkStart=curData.length?getMonday(curData[curData.length-1].date):mondayStr;
    const pwStart=addDays(wkStart,-7);
    prevData=ds.filter(d=>d.date>=pwStart&&d.date<=addDays(pwStart,6));
  } else if(cmpPreset==='prevMonth'&&compareMode==='preset'){
    const ym=curData.length?getYM(curData[0].date):curYM;
    const pym=prevYMOf(ym);
    prevData=ds.filter(d=>d.date.startsWith(pym));
  }

  sum7=curData.reduce((s,d)=>s+d.total_sales,0);
  sump7=prevData.reduce((s,d)=>s+d.total_sales,0);
  wow=sump7?((sum7-sump7)/sump7*100).toFixed(1):'0';
  ord7=curData.reduce((s,d)=>s+d.order_count,0);
  ordp7=prevData.reduce((s,d)=>s+d.order_count,0);
  wowOrd=ordp7?((ord7-ordp7)/ordp7*100).toFixed(1):'0';
  aov=ord7?Math.round(sum7/ord7):0;
  aovp=ordp7?Math.round(sump7/ordp7):0;
  wowAov=aovp?((aov-aovp)/aovp*100).toFixed(1):'0';

  const thisMonth=ds.filter(d=>d.date.startsWith(curYM));
  monthSum=thisMonth.reduce((s,d)=>s+d.total_sales,0);
  monthOrd=thisMonth.reduce((s,d)=>s+d.order_count,0);
  const curDayN=parseInt(latestDate.slice(8,10));
  const prevMonthSame=ds.filter(d=>d.date.startsWith(prevYM)&&parseInt(d.date.slice(8,10))<=curDayN);
  const prevMonthSum=prevMonthSame.reduce((s,d)=>s+d.total_sales,0);
  mom=prevMonthSum?((monthSum-prevMonthSum)/prevMonthSum*100).toFixed(1):'0';
}
calcMetrics();

function renderPeriodBtns() {
  document.getElementById('periodBtns').innerHTML = PERIODS.map(p =>
    `<button class="period-btn ${curPeriod===p.id?'active':''}" onclick="setPeriod('${p.id}')">${p.label}</button>`
  ).join('');
  document.getElementById('periodLabel').innerHTML = periodLabel+' <span class="time">'+periodDateRange+'</span>';
  const badge=document.getElementById('periodBadge');
  if(compareMode==='preset') badge.innerHTML=`<span class="period-badge">vs ${cmpPreset==='prev'?'전기간':cmpPreset==='prevWeek'?'전주':'전월'}</span>`;
  else badge.innerHTML='';
}

function setPeriod(p) {
  curPeriod=p;
  calcMetrics();
  renderPeriodBtns();
  renderKPI();
  renderPartCards();
  renderHourlyChart();
  renderProductRank();
}

function setCmpMode(mode) {
  compareMode=mode;
  document.querySelectorAll('.cmp-mode').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cmp-mode').forEach(b=>{if(b.textContent===(mode==='preset'?'프리셋':'끄기'))b.classList.add('active');});
  document.getElementById('cmpPresets').style.display=mode==='preset'?'':'none';
  calcMetrics();
  renderPeriodBtns();
  renderKPI();
  renderPartCards();
  renderHourlyChart();
  renderProductRank();
}

function setCmpPreset(preset) {
  cmpPreset=preset;
  document.querySelectorAll('.cmp-preset').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  calcMetrics();
  renderPeriodBtns();
  renderKPI();
  renderPartCards();
  renderHourlyChart();
  renderProductRank();
}

/* ===== Render functions ===== */

function renderKPI() {
  const showCmp = compareMode==='preset';
  document.getElementById('kpiRow').innerHTML = [
    {l:'매출액',v:fmtFull(sum7),c:showCmp?wow:null,d:showCmp?fmtFull(sump7):''},
    {l:'주문건수',v:ord7+'건',c:showCmp?wowOrd:null,d:showCmp?ordp7+'건':''},
    {l:'객단가',v:fmtFull(aov),c:showCmp?wowAov:null,d:showCmp?fmtFull(aovp):''},
  ].map(k=>`<div class="kpi"><div class="kpi-label">${k.l}</div><div class="kpi-val">${k.v}</div><div class="kpi-sub">${k.c!==null?`<span class="chg ${parseFloat(k.c)>=0?'up':'down'}">${parseFloat(k.c)>=0?'▲':'▼'} ${Math.abs(parseFloat(k.c)).toFixed(1)}%</span>`:''} <span class="kpi-desc">${k.d}</span></div></div>`).join('');
}

function renderPartCards() {
  const periodDates = curData.map(d=>d.date);
  const periodStart = periodDates.length ? periodDates[periodDates.length-1] : '';
  const periodEnd = periodDates.length ? periodDates[0] : '';

  const periodOrders = (D.orders||[]).filter(o=>o.d>=periodStart && o.d<=periodEnd);

  const buyerMap = {};
  D.buyers.forEach(b=>{buyerMap[b.id]=b;});

  const vvipIds=new Set(D.buyers.filter(b=>/vvip/i.test(b.grade)).map(b=>b.id));
  const newIds=new Set(D.buyers.filter(b=>b.first_order && b.first_order>=periodStart && b.first_order<=periodEnd).map(b=>b.id));

  function calc(idSet){
    const ords=periodOrders.filter(o=>idSet.has(o.m));
    const sales=ords.reduce((s,o)=>s+o.a,0);
    const cnt=ords.length;
    return {sales, orders:cnt, aov:cnt?Math.round(sales/cnt):0};
  }
  const existIds=new Set(periodOrders.map(o=>o.m).filter(m=>!vvipIds.has(m)&&!newIds.has(m)));

  const v=calc(vvipIds), n=calc(newIds), e=calc(existIds);
  const vCnt=new Set(periodOrders.filter(o=>vvipIds.has(o.m)).map(o=>o.m)).size;
  const nCnt=newIds.size;
  const eCnt=existIds.size;

  const cats=[
    {cls:'new-buyer',title:'신규',data:n,count:nCnt},
    {cls:'existing',title:'기존 고객',data:e,count:eCnt},
    {cls:'vvip',title:'VVIP',data:v,count:vCnt},
  ];
  document.getElementById('partRow').innerHTML = cats.map(c=>`<div class="part-card ${c.cls}"><div class="part-title">${c.title} <span style="font-size:12px;font-weight:400;color:var(--text3)">${c.count}사</span></div><div class="part-metrics"><div class="part-metric"><div class="pm-label">매출</div><div class="pm-val">${fmtKRW(c.data.sales)}원</div></div><div class="part-metric"><div class="pm-label">주문</div><div class="pm-val">${c.data.orders}건</div></div><div class="part-metric"><div class="pm-label">AOV</div><div class="pm-val">${fmtKRW(c.data.aov)}원</div></div></div></div>`).join('');
}

let hourlyChart;
function renderHourlyChart() {
  const periodDates = curData.map(d=>d.date);
  const pStart = periodDates.length ? periodDates[periodDates.length-1] : '';
  const pEnd = periodDates.length ? periodDates[0] : '';
  const prevDates = prevData.map(d=>d.date);
  const ppStart = prevDates.length ? prevDates[prevDates.length-1] : '';
  const ppEnd = prevDates.length ? prevDates[0] : '';

  const curH = (D.hourly||[]).filter(h=>h.d>=pStart&&h.d<=pEnd);
  const prevH = (D.hourly||[]).filter(h=>h.d>=ppStart&&h.d<=ppEnd);

  const curByHour = Array(24).fill(0);
  const prevByHour = Array(24).fill(0);
  curH.forEach(h=>{curByHour[h.h]+=h.s;});
  prevH.forEach(h=>{prevByHour[h.h]+=h.s;});

  const labels = Array.from({length:24},(_,i)=>i+'시');
  const ctx = document.getElementById('hourlyChart').getContext('2d');
  if(hourlyChart) hourlyChart.destroy();
  const datasets = [{label:'매출',data:curByHour,backgroundColor:'rgba(59,130,246,0.7)',borderRadius:3}];
  if(compareMode==='preset') datasets.push({label:'비교매출',data:prevByHour,backgroundColor:'rgba(209,213,219,0.5)',borderRadius:3});

  hourlyChart = new Chart(ctx,{
    type:'bar',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11},usePointStyle:true}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+fmtFull(ctx.raw)}}}},
      scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>fmtKRW(v)}},x:{ticks:{font:{size:10}}}}
    }
  });
}

function renderProductRank() {
  const periodDates = curData.map(d=>d.date);
  const pStart = periodDates.length ? periodDates[periodDates.length-1] : '';
  const pEnd = periodDates.length ? periodDates[0] : '';

  const pd = (D.product_daily||[]).filter(p=>p.d>=pStart&&p.d<=pEnd);
  const agg = {};
  pd.forEach(p=>{
    if(!agg[p.c]) agg[p.c]={name:p.n,orders:0,qty:0,amount:0};
    agg[p.c].orders+=p.o;
    agg[p.c].qty+=p.q;
    agg[p.c].amount+=p.a;
  });
  const ranked = Object.values(agg).sort((a,b)=>b.amount-a.amount).slice(0,20);

  document.getElementById('prodRankMeta').textContent = Object.keys(agg).length+'SKU';
  document.getElementById('prodRankHead').innerHTML = '<tr><th>#</th><th>상품</th><th style="text-align:right">매출</th><th style="text-align:center">주문</th><th style="text-align:center">수량</th></tr>';
  document.getElementById('prodRankBody').innerHTML = ranked.map((p,i)=>
    `<tr><td style="color:var(--text3)">${i+1}</td><td style="font-weight:600;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</td><td style="text-align:right;font-weight:600">${fmtFull(p.amount)}</td><td style="text-align:center">${p.orders}건</td><td style="text-align:center">${p.qty}개</td></tr>`
  ).join('');
}

/* ===== CSV Export ===== */
function exportCSV() {
  let csv = '날짜,수주건수,수주총액,평균수주액\n';
  ds.forEach(d=>csv+=`${d.date},${d.order_count},${d.total_sales},${d.avg_order||0}\n`);
  downloadCSV(csv, 'biteme_kr_b2b_daily.csv');
}


function downloadCSV(csv, filename) {
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ===== Init ===== */
function renderAll() {
  renderPeriodBtns();
  renderKPI();
  renderPartCards();
  renderHourlyChart();
  renderProductRank();
}
renderAll();
</script>
