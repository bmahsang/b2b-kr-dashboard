name: Daily Dashboard Update

on:
  schedule:
    # 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Godomall API
        env:
          GODO_PARTNER_KEY: ${{ secrets.GODO_PARTNER_KEY }}
          GODO_API_KEY: ${{ secrets.GODO_API_KEY }}
          CRAWL_DAYS: '7'
        run: python fetch_godo_data.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Inject auth gate
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python ci_build.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add godo_b2b_data.json index.html
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --yes --token "$VERCEL_TOKEN"
